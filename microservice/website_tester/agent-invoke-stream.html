<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoke Stream | Ponzgen</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="css/styles.css" rel="stylesheet">

    <link href="css/styles.css" rel="stylesheet">
</head>

<body>
    <!-- 3D NEURO-LINK BACKGROUND (Monochrome) -->
    <div id="canvas-bg"></div>

    <div class="app-layout">
        <!-- Sidebar Configuration Panel -->
        <aside class="sidebar-panel" id="sidebarPanel">
            <div class="sidebar-header d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-robot brand-icon fs-5"></i>
                    <span class="brand-text">Invoke Stream</span>
                </div>
                <!-- Back to Home -->
                <a href="index.html" class="icon-btn" title="Back to Hub">
                    <i class="bi bi-house"></i>
                </a>
            </div>

            <div class="sidebar-content flex-grow-1">
                <!-- Agent Selection -->
                <div class="mb-4">
                    <label class="form-label">Active Node</label>
                    <select class="form-select mb-2" id="agent-select">
                        <option value="">Scanning network...</option>
                    </select>
                    <button id="get-agent-info" class="btn btn-monochrome w-100 mb-2">
                        <i class="bi bi-search me-2"></i> INSPECT NODE
                    </button>
                    <div id="agent-info-container"></div>
                </div>

                <!-- Session Settings -->
                <div class="mb-4">
                    <label class="form-label">Environment</label>

                    <div class="mb-3">
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-secondary text-muted"
                                style="font-size: 0.7rem;">HASH</span>
                            <input type="text" class="form-control" id="thread-id" value="1" placeholder="Thread ID">
                        </div>
                    </div>

                    <div class="mb-3">
                        <select class="form-select" id="model-name">
                            <option value="">Auto Protocol</option>
                        </select>
                    </div>



                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input bg-dark border-secondary" type="checkbox" id="reset-memory">
                        <label class="form-check-label small text-secondary" for="reset-memory">Flush Memory</label>
                    </div>

                    <div class="form-check form-switch mb-4">
                        <input class="form-check-input bg-dark border-secondary" type="checkbox" id="load-from-json"
                            checked>
                        <label class="form-check-label small text-secondary" for="load-from-json">Load Context
                            (JSON)</label>
                    </div>
                </div>

                <!-- Advanced context -->
                <div class="mb-4">
                    <label class="form-label">Prompt Injection</label>
                    <textarea class="form-control" id="agent-context" rows="3"
                        placeholder="Enter your system prompt"></textarea>
                </div>

                <!-- Agent Style -->
                <div class="mb-4">
                    <label class="form-label">Persona Modulation</label>
                    <input type="text" class="form-control" id="agent-style" placeholder="e.g. professional, concise">
                </div>

                <!-- Tool Execution Log -->
                <div class="mb-4">
                    <label class="form-label d-flex justify-content-between align-items-center">
                        Active Tools
                        <span class="badge bg-dark border border-secondary text-secondary"
                            style="font-size: 0.6rem;">LIVE</span>
                    </label>
                    <div id="tool-status-container" class="bg-black border border-secondary rounded p-2 text-monospace"
                        style="font-family: 'Courier New', monospace; font-size: 0.65rem; height: 180px; overflow-y: auto; scrollbar-width: thin;">
                        <div class="text-muted text-center opacity-25 mt-4">
                            <i class="bi bi-terminal fs-4 d-block mb-1"></i>
                            Waiting for signals...
                        </div>
                    </div>
                </div>

                <!-- Performance Metrics -->
                <div class="mb-4">
                    <label class="form-label">Performance Metrics</label>
                    <div id="metrics-container" class="bg-black border border-secondary rounded p-2">
                        <div class="d-flex justify-content-between mb-1">
                            <span class="text-secondary small" style="font-size: 0.7rem;">Model Init:</span>
                            <span class="text-white small fw-bold" id="metric-model-init">-</span>
                        </div>
                        <div class="d-flex justify-content-between mb-1">
                            <span class="text-secondary small" style="font-size: 0.7rem;">Agent Init:</span>
                            <span class="text-white small fw-bold" id="metric-agent-init">-</span>
                        </div>
                        <div class="d-flex justify-content-between mb-1">
                            <span class="text-secondary small" style="font-size: 0.7rem;">Response Time:</span>
                            <span class="text-white small fw-bold" id="metric-response-time">-</span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="text-secondary small" style="font-size: 0.7rem;">Recursions:</span>
                            <span class="text-white small fw-bold" id="metric-recursion">-</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="sidebar-footer pt-3 mt-auto border-top border-secondary">
                <button id="update-settings" class="btn btn-apply w-100">
                    <i class="bi bi-cpu me-2"></i> APPLY CONFIG
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <!-- Glass Header -->
            <header class="chat-header">
                <div class="d-flex align-items-center">
                    <button class="icon-btn d-md-none me-2" id="toggleSidebar">
                        <i class="bi bi-list"></i>
                    </button>
                    <div>
                        <div class="d-flex align-items-center gap-2">
                            <span id="current-status" class="status-badge">
                                <span class="spinner-grow spinner-grow-sm me-2 bg-white"
                                    style="width: 4px; height: 4px;"></span>
                                UPLINK: STABLE
                            </span>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button id="clear-response" class="icon-btn text-danger" title="Purge Logs">
                        <i class="bi bi-trash3"></i>
                    </button>
                </div>
            </header>



            <!-- Chat Messages (Scrollable) -->
            <div id="chat-container">
                <div class="h-100 d-flex flex-column align-items-center justify-content-center opacity-10">
                    <i class="bi bi-robot display-1 mb-4"></i>
                    <p class="h4 text-uppercase fw-light" style="letter-spacing: 5px;">Awaiting Data</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-wrapper">
                <div class="input-container">


                    <div id="image-preview"
                        class="position-absolute bottom-100 start-0 mb-3 ms-4 p-2 bg-dark border border-secondary"
                        style="display: none; z-index: 30; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                        <div class="position-relative">
                            <img id="preview-image" src="#" alt="Preview"
                                style="height: 100px; width: auto; border-radius: 8px;">
                            <button id="remove-image"
                                class="btn btn-dark btn-sm p-0 rounded-circle position-absolute top-0 end-0 translate-middle border border-secondary"
                                style="width: 24px; height: 24px;">
                                <i class="bi bi-x"></i>
                            </button>
                        </div>
                    </div>

                    <div id="recommendation-chips-container">
                        <div class="recommendation-chip" onclick="sendQuickMessage('Objek atau subjek apa yang terlihat di latar depan?')">
                            <i class="bi bi-eye me-1"></i> Objek Latar Depan
                        </div>
                        <div class="recommendation-chip" onclick="sendQuickMessage('Aktivitas apa yang dilakukan oleh objek atau subjek?')">
                            <i class="bi bi-activity me-1"></i> Aktivitas Objek
                        </div>
                        <div class="recommendation-chip" onclick="sendQuickMessage('Warna, bentuk, atau atribut apa yang terdapat pada objek tersebut? Berapakah jumlahnya?')">
                            <i class="bi bi-palette me-1"></i> Atribut & Jumlah
                        </div>
                    </div>

                    <div class="input-capsule">
                        <input type="text" id="agent-message" class="chat-input-field" placeholder="Type a message..."
                            autocomplete="off">

                        <div class="input-actions">
                            <div class="secondary-actions">
                                <label class="icon-btn" style="cursor: pointer;" title="Attach Visuals">
                                    <i class="bi bi-paperclip fs-5"></i>
                                    <input type="file" id="image-upload" accept="image/*" style="display: none;">
                                </label>
                                <button class="icon-btn" title="System Settings">
                                    <i class="bi bi-sliders"></i>
                                </button>
                            </div>

                            <button id="invoke-agent" class="send-btn">
                                <i class="bi bi-arrow-up-short fs-4"></i>
                            </button>
                        </div>
                    </div>

                    <div class="text-center mt-2">
                        <span class="text-muted" style="font-size: 0.65rem; letter-spacing: 1px;">PONZGEN QUANTUM STREAM
                            v2.5 // SECURE UPLINK</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/agent-invoke-stream.js"></script>

    <script src="js/tesseract-bg.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initTesseractBackground('canvas-bg', { dimmer: true, scale: 3, cameraZ: 40 });
        });
    </script>
</body>

</html>
